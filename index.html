<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gabor Patch Match Training MVP</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="container">
      <h1>Gabor Patch 比對訓練</h1>
      <p class="subtitle">上方會顯示目標 Gabor Patch，下方會出現十幾個 Gabor Patch，請選出所有與目標完全相同的刺激。</p>

      <section class="panel controls">
        <button id="startBtn">開始訓練（3 Blocks × 12 Trials）</button>
        <p>操作：點選下方符號可切換選取，全部找對後會自動進入下一題。</p>
        <p>每題不限時，但會記錄反應時間，並納入分數計算。</p>
        <p class="note">訓練用途，非醫療診斷或治療。</p>
      </section>

      <section class="panel status">
        <div id="statusText">尚未開始</div>
        <div id="hintText">準備好後按開始</div>
        <div id="feedbackText" aria-live="polite"></div>
      </section>

      <section class="panel stimulus-wrap">
        <div class="stimulus-header">
          <div class="stimulus-label">目標符號</div>
          <div id="targetCountText" class="target-count">相同數量：-</div>
        </div>
        <canvas id="targetCanvas" width="140" height="140" aria-label="target symbol"></canvas>
        <div class="progress-wrap" aria-label="session progress">
          <div class="progress-meta">
            <span>進度</span>
            <span id="progressText">0 / 36</span>
          </div>
          <div class="progress-track">
            <div id="progressFill" class="progress-fill"></div>
          </div>
        </div>
        <div id="candidateLabel" class="stimulus-label">候選符號（請選出 - 個相同）</div>
        <canvas id="optionsCanvas" width="720" height="500" aria-label="candidate symbols"></canvas>
      </section>

      <section class="panel" id="resultPanel" hidden>
        <h2>本次結果</h2>
        <ul id="resultList"></ul>
      </section>

      <section class="panel">
        <h2>近期紀錄（本機）</h2>
        <ul id="historyList"></ul>
      </section>
    </main>
    <div id="celebrationPopup" class="celebration-popup" hidden role="status" aria-live="polite">
      <div class="celebration-card">🎉 恭喜答對！</div>
    </div>

    <script src="app.js" defer></script>
  </body>
</html>
